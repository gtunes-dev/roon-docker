name: Build and Publish

on:
  workflow_dispatch:
  push:
    branches: [photon]
    tags: ['photon-v*']
    paths:
      - 'Dockerfile'
      - 'entrypoint.sh'
      - 'tests/**'
      - '.github/workflows/build.yml'
  pull_request:
    paths:
      - 'Dockerfile'
      - 'entrypoint.sh'
      - 'tests/**'
      - '.github/workflows/build.yml'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: gtunes-dev/roonserver

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set build date
        run: echo "BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      # Strip the `photon-` prefix so the docker image tag is pure semver
      # (e.g. tag `photon-v1.2.3` -> docker tag `1.2.3`). The variant
      # lives in the image name (roonserver-photon), never in the tag.
      - name: Extract semver from photon-v* tag
        id: ver
        if: startsWith(github.ref, 'refs/tags/photon-v')
        run: echo "value=${GITHUB_REF#refs/tags/photon-}" >> "$GITHUB_OUTPUT"

      - name: Generate tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.ver.outputs.value }},enable=${{ steps.ver.outputs.value != '' }}
            type=raw,value=latest,enable=${{ steps.ver.outputs.value != '' && !contains(steps.ver.outputs.value, '-') }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: roonserver:test
          build-args: |
            VERSION=${{ steps.meta.outputs.version || 'dev' }}
            GIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ env.BUILD_DATE }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke tests
        run: ./tests/smoke.sh roonserver:test

      - name: Runtime tests
        run: ./tests/runtime.sh roonserver:test

      - name: Save tested image
        if: startsWith(github.ref, 'refs/tags/photon-v')
        run: docker save roonserver:test -o /tmp/roonserver.tar

      - name: Upload tested image
        if: startsWith(github.ref, 'refs/tags/photon-v')
        uses: actions/upload-artifact@v4
        with:
          name: roonserver-image
          path: /tmp/roonserver.tar
          retention-days: 1

  publish:
    if: startsWith(github.ref, 'refs/tags/photon-v')
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Download tested image
        uses: actions/download-artifact@v4
        with:
          name: roonserver-image
          path: /tmp

      - name: Load tested image
        run: docker load -i /tmp/roonserver.tar

      # Same prefix-strip as in the build job; this job only runs on
      # photon-v* tags so the extract always produces a value here.
      - name: Extract semver from photon-v* tag
        id: ver
        run: echo "value=${GITHUB_REF#refs/tags/photon-}" >> "$GITHUB_OUTPUT"

      - name: Generate tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.ver.outputs.value }}
            type=raw,value=latest,enable=${{ !contains(steps.ver.outputs.value, '-') }}

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push
        env:
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          for tag in $IMAGE_TAGS; do
            docker tag roonserver:test "$tag"
          done
          for tag in $IMAGE_TAGS; do
            docker push "$tag"
          done
