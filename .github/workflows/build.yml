name: Build and Publish

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'Dockerfile'
      - 'entrypoint.sh'
      - 'tests/**'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: gtunes-dev/roonserver

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set build date
        run: echo "BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - name: Generate tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ !contains(github.ref, '-') }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: roonserver:test
          build-args: |
            VERSION=${{ steps.meta.outputs.version || 'dev' }}
            GIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ env.BUILD_DATE }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke tests
        run: ./tests/smoke.sh roonserver:test

      - name: Runtime tests
        run: ./tests/runtime.sh roonserver:test

      - name: Save tested image
        if: startsWith(github.ref, 'refs/tags/v')
        run: docker save roonserver:test -o /tmp/roonserver.tar

      - name: Upload tested image
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: roonserver-image
          path: /tmp/roonserver.tar
          retention-days: 1

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download tested image
        uses: actions/download-artifact@v4
        with:
          name: roonserver-image
          path: /tmp

      - name: Load tested image
        run: docker load -i /tmp/roonserver.tar

      - name: Generate tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ !contains(github.ref, '-') }}

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push
        env:
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          for tag in $IMAGE_TAGS; do
            docker tag roonserver:test "$tag"
          done
          for tag in $IMAGE_TAGS; do
            docker push "$tag"
          done
